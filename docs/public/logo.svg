<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bd34fe"/>
      <stop offset="100%" style="stop-color:#47cf73"/>
    </linearGradient>
  </defs>
  <!-- Agent icon: circular node with connections -->
  <circle cx="64" cy="64" r="24" fill="url(#grad)" opacity="0.9"/>
  <circle cx="64" cy="64" r="16" fill="#1a1a1a"/>
  <circle cx="64" cy="64" r="8" fill="url(#grad)"/>
  <!-- Connection lines -->
  <line x1="64" y1="40" x2="64" y2="16" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="88" y1="64" x2="112" y2="64" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="88" x2="64" y2="112" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="64" x2="16" y2="64" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Small nodes -->
  <circle cx="64" cy="16" r="6" fill="url(#grad)"/>
  <circle cx="112" cy="64" r="6" fill="url(#grad)"/>
  <circle cx="64" cy="112" r="6" fill="url(#grad)"/>
  <circle cx="16" cy="64" r="6" fill="url(#grad)"/>
</svg>