<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentForge Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0f0f14;
      --bg-secondary: #16161e;
      --bg-tertiary: #1e1e2a;
      --bg-hover: #252536;
      --border: #2a2a3a;
      --text-primary: #e4e4ef;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent: #7c6aef;
      --accent-hover: #9484ff;
      --success: #4ade80;
      --warning: #fbbf24;
      --error: #f87171;
      --info: #60a5fa;
      --tool-bg: #1a1a2e;
      --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; }

    /* Layout */
    .app { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h2 { font-size: 16px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    .sidebar-header p { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .new-chat-btn { width: calc(100% - 32px); margin: 12px 16px; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.2s; }
    .new-chat-btn:hover { background: var(--accent-hover); }
    .sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item { padding: 10px 12px; margin-bottom: 4px; border-radius: var(--radius); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
    .session-item:hover { background: var(--bg-hover); }
    .session-item.active { background: var(--bg-tertiary); border-left: 3px solid var(--accent); }
    .session-item .title { font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-item .delete { opacity: 0; background: none; border: none; color: var(--error); cursor: pointer; font-size: 14px; padding: 0 4px; }
    .session-item:hover .delete { opacity: 1; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); }

    /* Main Area */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* Header */
    .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); }
    .chat-header h3 { font-size: 14px; }
    .header-actions { display: flex; gap: 8px; }
    .header-btn { padding: 6px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); border-radius: var(--radius); cursor: pointer; font-size: 12px; transition: all 0.2s; }
    .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .header-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* Content Area */
    .content { flex: 1; display: flex; overflow: hidden; }

    /* Chat Panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { display: flex; max-width: 85%; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .message.tool { align-self: flex-start; max-width: 95%; }
    .message .bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
    .message.user .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .message.assistant .bubble { background: var(--bg-tertiary); color: var(--text-primary); border-bottom-left-radius: 4px; }
    .message.tool .bubble { background: var(--tool-bg); color: var(--text-secondary); font-family: 'Fira Code', monospace; font-size: 12px; border: 1px solid var(--border); }
    .message .label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Input Area */
    .input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg-secondary); }
    .input-wrapper { display: flex; gap: 8px; max-width: 900px; margin: 0 auto; }
    .input-area textarea { flex: 1; padding: 10px 14px; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius); font-size: 13px; resize: none; min-height: 44px; max-height: 120px; font-family: inherit; transition: border-color 0.2s; }
    .input-area textarea:focus { outline: none; border-color: var(--accent); }
    .input-area button { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.2s; }
    .input-area button:hover { background: var(--accent-hover); }
    .input-area button:disabled { background: var(--bg-tertiary); color: var(--text-muted); cursor: not-allowed; }

    /* Right Panel */
    .right-panel { width: 380px; background: var(--bg-secondary); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    .right-panel.hidden { display: none; }
    .panel-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .panel-tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .panel-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .panel-content { flex: 1; overflow-y: auto; padding: 12px; }

    /* Event Timeline */
    .event-timeline { display: flex; flex-direction: column; gap: 6px; }
    .event-item { padding: 8px 10px; background: var(--bg-tertiary); border-radius: var(--radius); border-left: 3px solid var(--border); font-size: 12px; transition: background 0.2s; cursor: pointer; }
    .event-item:hover { background: var(--bg-hover); }
    .event-item.agent { border-left-color: var(--accent); }
    .event-item.llm { border-left-color: var(--info); }
    .event-item.tool { border-left-color: var(--warning); }
    .event-item.error { border-left-color: var(--error); }
    .event-item .event-type { font-weight: 600; margin-bottom: 2px; }
    .event-item .event-detail { color: var(--text-secondary); font-size: 11px; }
    .event-item .event-time { color: var(--text-muted); font-size: 10px; margin-top: 4px; }

    /* Tool Inspector */
    .tool-card { padding: 12px; background: var(--bg-tertiary); border-radius: var(--radius); margin-bottom: 8px; }
    .tool-card .tool-name { font-weight: 600; color: var(--warning); margin-bottom: 4px; }
    .tool-card .tool-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .tool-card .tool-args { background: var(--bg-primary); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 11px; margin-bottom: 8px; overflow-x: auto; }
    .tool-card .tool-result { background: var(--bg-primary); padding: 8px; border-radius: 4px; font-family: monospace; font-size: 11px; color: var(--success); overflow-x: auto; }
    .tool-card .tool-error { color: var(--error); }

    /* Config Panel */
    .config-group { margin-bottom: 16px; }
    .config-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .config-group input, .config-group select { width: 100%; padding: 8px 10px; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius); font-size: 12px; }
    .config-group input:focus, .config-group select:focus { outline: none; border-color: var(--accent); }
    .config-info { padding: 12px; background: var(--bg-tertiary); border-radius: var(--radius); font-size: 12px; }
    .config-info .info-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
    .config-info .info-row:last-child { border-bottom: none; }
    .config-info .info-label { color: var(--text-secondary); }
    .config-info .info-value { color: var(--text-primary); font-weight: 500; }

    /* Empty State */
    .empty-state { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); }
    .empty-state p { font-size: 13px; }

    /* Status Bar */
    .status-bar { padding: 6px 16px; border-top: 1px solid var(--border); background: var(--bg-secondary); font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; }
    .status-bar .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
    .status-bar .status-dot.connected { background: var(--success); }
    .status-bar .status-dot.thinking { background: var(--warning); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>🤖 AgentForge</h2>
        <p>Playground v1.0</p>
      </div>
      <button class="new-chat-btn" onclick="createSession()">+ New Chat</button>
      <div class="sessions-list" id="sessions-list"></div>
      <div class="sidebar-footer">
        Model: <span id="model-name">-</span>
      </div>
    </div>

    <!-- Main Area -->
    <div class="main">
      <div class="chat-header" id="chat-header" style="display:none">
        <h3 id="session-title">-</h3>
        <div class="header-actions">
          <button class="header-btn" onclick="clearSession()">Clear</button>
          <button class="header-btn" id="toggle-panel-btn" onclick="toggleRightPanel()">Panel</button>
        </div>
      </div>

      <div class="content">
        <div class="chat-panel">
          <div id="chat-container">
            <div class="empty-state">
              <div class="icon">💬</div>
              <h3>Start a new conversation</h3>
              <p>Create a new chat to begin</p>
            </div>
          </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel" id="right-panel">
          <div class="panel-tabs">
            <div class="panel-tab active" data-tab="events" onclick="switchTab('events')">Events</div>
            <div class="panel-tab" data-tab="tools" onclick="switchTab('tools')">Tools</div>
            <div class="panel-tab" data-tab="config" onclick="switchTab('config')">Config</div>
          </div>
          <div class="panel-content">
            <!-- Events Tab -->
            <div id="tab-events" class="tab-content">
              <div class="event-timeline" id="event-timeline">
                <div class="empty-state" style="padding: 20px;">
                  <p>No events yet</p>
                </div>
              </div>
            </div>
            <!-- Tools Tab -->
            <div id="tab-tools" class="tab-content" style="display:none">
              <div id="tool-inspector">
                <div class="empty-state" style="padding: 20px;">
                  <p>No tool calls yet</p>
                </div>
              </div>
            </div>
            <!-- Config Tab -->
            <div id="tab-config" class="tab-content" style="display:none">
              <div class="config-group">
                <label>Model</label>
                <input type="text" id="config-model" readonly>
              </div>
              <div class="config-group">
                <label>Base URL</label>
                <input type="text" id="config-base-url" readonly>
              </div>
              <div class="config-group">
                <label>Max Steps</label>
                <input type="number" id="config-max-steps" value="10" readonly>
              </div>
              <div class="config-group">
                <label>Available Tools</label>
                <div id="config-tools-list" class="config-info"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <div><span class="status-dot connected" id="status-dot"></span><span id="status-text">Ready</span></div>
        <div>Events: <span id="event-count">0</span> | Tokens: <span id="token-count">0</span></div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // State
    // ============================================================
    let currentSessionId = null;
    let sessions = [];
    let isStreaming = false;
    let events = [];
    let toolCalls = [];
    let totalTokens = 0;

    // ============================================================
    // API Calls
    // ============================================================
    async function fetchSessions() {
      const res = await fetch('/api/sessions');
      sessions = await res.json();
      renderSessions();
    }

    async function fetchConfig() {
      const res = await fetch('/api/config');
      const config = await res.json();
      document.getElementById('model-name').textContent = config.model;
      document.getElementById('config-model').value = config.model;
      document.getElementById('config-base-url').value = config.baseUrl;
      document.getElementById('config-max-steps').value = config.maxSteps;

      const toolsList = document.getElementById('config-tools-list');
      toolsList.innerHTML = config.tools.map(t =>
        `<div class="info-row"><span class="info-label">${t.name}</span><span class="info-value">${t.description}</span></div>`
      ).join('');
    }

    async function createSession() {
      const res = await fetch('/api/sessions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      const session = await res.json();
      sessions.unshift(session);
      renderSessions();
      selectSession(session.id);
    }

    async function deleteSession(id) {
      await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
      sessions = sessions.filter(s => s.id !== id);
      if (currentSessionId === id) {
        currentSessionId = null;
        renderChat();
      }
      renderSessions();
    }

    async function clearSession() {
      if (!currentSessionId) return;
      await fetch(`/api/sessions/${currentSessionId}/clear`, { method: 'POST' });
      events = [];
      toolCalls = [];
      totalTokens = 0;
      renderEvents();
      renderTools();
      updateStats();
      renderChat();
    }

    async function selectSession(id) {
      currentSessionId = id;
      const res = await fetch(`/api/sessions/${id}`);
      const session = await res.json();
      const idx = sessions.findIndex(s => s.id === id);
      if (idx >= 0) sessions[idx] = session;
      events = session.events || [];
      toolCalls = events.filter(e => e.type === 'tool.call' || e.type === 'tool.result');
      renderSessions();
      renderChat();
      renderEvents();
      renderTools();
      updateStats();
    }

    // ============================================================
    // Chat
    // ============================================================
    async function sendMessage() {
      const input = document.getElementById('message-input');
      const message = input.value.trim();
      if (!message || isStreaming) return;

      input.value = '';
      input.style.height = 'auto';

      addMessageToUI('user', message);

      isStreaming = true;
      updateStatus('thinking', 'Thinking...');
      document.getElementById('send-btn').disabled = true;

      let assistantMessage = '';
      let messageDiv = null;

      try {
        const response = await fetch(`/api/sessions/${currentSessionId}/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;

            try {
              const event = JSON.parse(line.slice(6));

              // Store event
              events.push(event);
              updateStats();

              // Categorize event
              if (event.type === 'tool.call' || event.type === 'tool.result') {
                toolCalls.push(event);
                renderTools();
              }

              // Render event in timeline
              addEventToTimeline(event);

              // Handle specific event types
              if (event.type === 'llm.stream.text' || event.type === 'text') {
                if (!messageDiv) {
                  messageDiv = addMessageToUI('assistant', '');
                }
                assistantMessage += event.delta || '';
                messageDiv.querySelector('.bubble').textContent = assistantMessage;
                scrollToBottom();
              } else if (event.type === 'tool.call') {
                addMessageToUI('tool', `🔧 ${event.toolName}(${JSON.stringify(event.args, null, 2)})`);
              } else if (event.type === 'tool.result') {
                addMessageToUI('tool', `📋 ${event.toolName}: ${(event.result || '').substring(0, 200)}`);
              } else if (event.type === 'agent.complete') {
                if (!assistantMessage && event.output) {
                  assistantMessage = event.output;
                  if (!messageDiv) {
                    messageDiv = addMessageToUI('assistant', '');
                  }
                  messageDiv.querySelector('.bubble').textContent = assistantMessage;
                }
              } else if (event.type === 'done') {
                // Stream complete
              } else if (event.type === 'error') {
                addMessageToUI('assistant', `❌ ${event.error?.message || event.error || 'Unknown error'}`);
              }
            } catch (e) {
              // Skip malformed events
            }
          }
        }
      } catch (err) {
        addMessageToUI('assistant', `❌ Error: ${err.message}`);
      }

      isStreaming = false;
      updateStatus('connected', 'Ready');
      document.getElementById('send-btn').disabled = false;

      // Update session messages
      const session = sessions.find(s => s.id === currentSessionId);
      if (session) {
        session.messages.push({ role: 'user', content: message });
        if (assistantMessage) {
          session.messages.push({ role: 'assistant', content: assistantMessage });
        }
      }
    }

    // ============================================================
    // UI Rendering
    // ============================================================
    function renderSessions() {
      const list = document.getElementById('sessions-list');
      list.innerHTML = sessions.map(s => `
        <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" onclick="selectSession('${s.id}')">
          <span class="title">${escapeHtml(s.title)}</span>
          <button class="delete" onclick="event.stopPropagation(); deleteSession('${s.id}')" title="Delete">×</button>
        </div>
      `).join('');
    }

    function renderChat() {
      const container = document.getElementById('chat-container');
      const header = document.getElementById('chat-header');

      if (!currentSessionId) {
        header.style.display = 'none';
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">💬</div>
            <h3>Start a new conversation</h3>
            <p>Create a new chat to begin</p>
          </div>
        `;
        return;
      }

      const session = sessions.find(s => s.id === currentSessionId);
      if (!session) return;

      header.style.display = 'flex';
      document.getElementById('session-title').textContent = session.title;

      container.innerHTML = `
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <div class="input-wrapper">
            <textarea id="message-input" placeholder="Type a message..." rows="1" onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
          </div>
        </div>
      `;

      // Render existing messages
      const messagesDiv = document.getElementById('messages');
      (session.messages || []).forEach(msg => {
        addMessageToUI(msg.role, msg.content);
      });

      scrollToBottom();
    }

    function addMessageToUI(role, content) {
      const messagesDiv = document.getElementById('messages');
      if (!messagesDiv) return null;

      const div = document.createElement('div');
      div.className = `message ${role}`;

      let label = '';
      if (role === 'tool') label = '<div class="label">Tool</div>';
      if (role === 'assistant') label = '<div class="label">Assistant</div>';
      if (role === 'user') label = '<div class="label">You</div>';

      div.innerHTML = `${label}<div class="bubble">${escapeHtml(content)}</div>`;
      messagesDiv.appendChild(div);
      scrollToBottom();
      return div;
    }

    function scrollToBottom() {
      const messagesDiv = document.getElementById('messages');
      if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ============================================================
    // Event Timeline
    // ============================================================
    function renderEvents() {
      const timeline = document.getElementById('event-timeline');
      if (events.length === 0) {
        timeline.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>No events yet</p></div>';
        return;
      }
      timeline.innerHTML = events.map((e, i) => createEventHTML(e, i)).join('');
    }

    function addEventToTimeline(event) {
      const timeline = document.getElementById('event-timeline');
      if (timeline.querySelector('.empty-state')) {
        timeline.innerHTML = '';
      }
      timeline.innerHTML += createEventHTML(event, events.length - 1);
      timeline.scrollTop = timeline.scrollHeight;
    }

    function createEventHTML(event, index) {
      const category = getEventCategory(event.type);
      const detail = getEventDetail(event);
      const time = new Date().toLocaleTimeString();

      return `
        <div class="event-item ${category}" onclick="showEventDetail(${index})">
          <div class="event-type">${event.type}</div>
          <div class="event-detail">${detail}</div>
          <div class="event-time">${time}</div>
        </div>
      `;
    }

    function getEventCategory(type) {
      if (type.startsWith('agent.')) return 'agent';
      if (type.startsWith('llm.')) return 'llm';
      if (type.startsWith('tool.')) return 'tool';
      if (type === 'error') return 'error';
      return '';
    }

    function getEventDetail(event) {
      switch (event.type) {
        case 'agent.start': return `Session: ${event.sessionId?.substring(0, 8)}...`;
        case 'agent.step': return `Step ${event.step}/${event.maxSteps}`;
        case 'agent.complete': return `Output: ${(event.output || '').substring(0, 50)}...`;
        case 'llm.request': return `Messages: ${event.messages?.length || 0}`;
        case 'llm.response': return `Tokens: ${event.usage?.totalTokens || '-'}`;
        case 'llm.stream.text': return `"${(event.delta || '').substring(0, 30)}..."`;
        case 'tool.call': return `${event.toolName}(${JSON.stringify(event.args).substring(0, 30)}...)`;
        case 'tool.result': return `${event.toolName}: ${(event.result || '').substring(0, 30)}...`;
        case 'done': return `Reason: ${event.reason}`;
        default: return JSON.stringify(event).substring(0, 50);
      }
    }

    function showEventDetail(index) {
      const event = events[index];
      if (!event) return;
      console.log('Event detail:', event);
      // Could open a modal with full event JSON
    }

    // ============================================================
    // Tool Inspector
    // ============================================================
    function renderTools() {
      const inspector = document.getElementById('tool-inspector');

      // Group by tool call ID
      const calls = {};
      toolCalls.forEach(e => {
        if (e.type === 'tool.call') {
          calls[e.toolCallId || e.toolName] = { call: e, result: null };
        } else if (e.type === 'tool.result') {
          const id = e.toolCallId || e.toolName;
          if (calls[id]) {
            calls[id].result = e;
          } else {
            calls[id] = { call: null, result: e };
          }
        }
      });

      const entries = Object.values(calls);
      if (entries.length === 0) {
        inspector.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>No tool calls yet</p></div>';
        return;
      }

      inspector.innerHTML = entries.map(({ call, result }) => {
        const name = call?.toolName || result?.toolName || 'Unknown';
        const args = call?.args ? JSON.stringify(call.args, null, 2) : null;
        const resultText = result?.result || null;
        const isError = result?.isError;

        return `
          <div class="tool-card">
            <div class="tool-name">🔧 ${escapeHtml(name)}</div>
            ${args ? `<div class="tool-args">${escapeHtml(args)}</div>` : ''}
            ${resultText ? `<div class="tool-result ${isError ? 'tool-error' : ''}">${escapeHtml(resultText)}</div>` : '<div class="tool-desc">Waiting for result...</div>'}
          </div>
        `;
      }).join('');
    }

    // ============================================================
    // Tabs
    // ============================================================
    function switchTab(tabName) {
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
      document.querySelector(`.panel-tab[data-tab="${tabName}"]`).classList.add('active');
      document.getElementById(`tab-${tabName}`).style.display = 'block';
    }

    function toggleRightPanel() {
      const panel = document.getElementById('right-panel');
      const btn = document.getElementById('toggle-panel-btn');
      panel.classList.toggle('hidden');
      btn.classList.toggle('active');
    }

    // ============================================================
    // Status
    // ============================================================
    function updateStatus(state, text) {
      const dot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      dot.className = `status-dot ${state}`;
      statusText.textContent = text;
    }

    function updateStats() {
      document.getElementById('event-count').textContent = events.length;
      const tokens = events.filter(e => e.type === 'llm.response' && e.usage)
        .reduce((sum, e) => sum + (e.usage.totalTokens || 0), 0);
      document.getElementById('token-count').textContent = tokens;
    }

    // ============================================================
    // Helpers
    // ============================================================
    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================================
    // Init
    // ============================================================
    fetchSessions();
    fetchConfig();
  </script>
</body>
</html>
