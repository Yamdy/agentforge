<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primo Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --error: #f85149;
      --tool: #a371f7;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    header {
      padding: 16px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }
    
    .status-dot.disconnected {
      background: var(--error);
    }
    
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .message {
      margin-bottom: 24px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      text-align: right;
    }
    
    .message-content {
      display: inline-block;
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--bg-tertiary);
      white-space: pre-wrap;
      word-break: break-word;
    }
    
    .message.user .message-content {
      background: var(--accent);
      color: white;
    }
    
    .message.assistant .message-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    
    .tool-call {
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(163, 113, 247, 0.15);
      border: 1px solid var(--tool);
      border-radius: 8px;
      font-size: 13px;
      color: var(--tool);
    }
    
    .tool-result {
      margin-top: 4px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .input-area {
      padding: 16px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }
    
    .input-wrapper {
      display: flex;
      gap: 12px;
      max-width: 800px;
      margin: 0 auto;
    }
    
    input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    input:focus {
      border-color: var(--accent);
    }
    
    input:disabled {
      opacity: 0.5;
    }
    
    button {
      padding: 12px 24px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      padding: 8px 0;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .config-panel {
      padding: 12px 24px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 13px;
    }
    
    .config-panel input {
      flex: 0 0 200px;
      padding: 8px 12px;
      font-size: 13px;
    }
    
    .config-panel label {
      color: var(--text-secondary);
    }
    
    .step-info {
      color: var(--text-secondary);
      font-size: 13px;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Primo Agent</h1>
    <div class="status">
      <span id="sessionId" style="font-size: 11px; color: #8b949e; margin-right: 8px;"></span>
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>
  
  <div class="config-panel">
    <label>Server URL:</label>
    <input type="text" id="serverUrl" value="http://localhost:3000" placeholder="http://localhost:3000">
    <label>API Key:</label>
    <input type="password" id="apiKey" placeholder="Optional">
    <button id="connectBtn" style="padding: 8px 16px;">Connect</button>
  </div>
  
  <div class="main">
    <div class="messages" id="messages"></div>
    
    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="input" placeholder="Ask something..." disabled>
        <button id="sendBtn" disabled>Send</button>
      </div>
    </div>
  </div>

  <script>
    const serverUrlInput = document.getElementById('serverUrl');
    const apiKeyInput = document.getElementById('apiKey');
    const connectBtn = document.getElementById('connectBtn');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const messages = document.getElementById('messages');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const sessionIdSpan = document.getElementById('sessionId');

    let serverUrl = 'http://localhost:3000';
    let apiKey = '';
    let sessionId = null;

    function updateStatus(connected) {
      statusDot.className = connected ? 'status-dot' : 'status-dot disconnected';
      statusText.textContent = connected ? 'Connected' : 'Disconnected';
      input.disabled = !connected;
      sendBtn.disabled = !connected;
    }

    async function createSession() {
      try {
        const res = await fetch(`${serverUrl}/api/sessions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: 'Web Chat' })
        });
        const session = await res.json();
        sessionId = session.id;
        sessionIdSpan.textContent = sessionId ? `[${sessionId.slice(0, 12)}...]` : '';
      } catch (err) {
        console.error('Failed to create session:', err);
      }
    }

    async function checkHealth() {
      try {
        const res = await fetch(`${serverUrl}/health`);
        const data = await res.json();
        updateStatus(data.status === 'ok');
        if (data.status === 'ok') {
          await createSession();
        }
      } catch {
        updateStatus(false);
      }
    }

    connectBtn.addEventListener('click', () => {
      serverUrl = serverUrlInput.value.trim() || 'http://localhost:3000';
      apiKey = apiKeyInput.value.trim();
      checkHealth();
    });

    function addMessage(content, isUser = false) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'assistant'}`;
      div.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function addToolCall(name) {
      const div = document.createElement('div');
      div.className = 'tool-call';
      div.textContent = `🔧 Calling ${name}...`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function addToolResult(result) {
      const div = document.createElement('div');
      div.className = 'tool-result';
      div.textContent = `→ ${result}`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function send() {
      const userInput = input.value.trim();
      if (!userInput) return;

      input.value = '';
      addMessage(userInput, true);

      const loadingDiv = addMessage('');
      loadingDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Thinking...</div>';
      loadingDiv.className = 'message assistant';

      let currentToolCall = null;

      try {
        const headers = {
          'Content-Type': 'application/json',
        };
        if (apiKey) {
          headers['Authorization'] = `Bearer ${apiKey}`;
        }

        let url = `${serverUrl}/api/agent/run/stream`;
        if (sessionId) {
          url = `${serverUrl}/api/sessions/${sessionId}/run/stream`;
        }

        const response = await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify({ input: userInput }),
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || error.error || 'Request failed');
        }

        loadingDiv.remove();

        const reader = response.body?.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        let messageDiv = addMessage('');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data: ')) continue;

            const data = trimmed.slice(6);
            try {
              const event = JSON.parse(data);

              switch (event.type) {
                case 'text':
                  if (event.content) {
                    messageDiv.querySelector('.message-content').textContent += event.content;
                  }
                  break;
                case 'tool_call_start':
                  currentToolCall = addToolCall(event.name);
                  break;
                case 'tool_call_end':
                  if (event.result) {
                    addToolResult(event.result);
                  }
                  currentToolCall = null;
                  break;
                case 'done':
                  messages.scrollTop = messages.scrollHeight;
                  return;
              }
            } catch {}
          }
        }
      } catch (err) {
        loadingDiv.remove();
        addMessage(`Error: ${err.message}`, false);
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') send();
    });

    checkHealth();
  </script>
</body>
</html>
